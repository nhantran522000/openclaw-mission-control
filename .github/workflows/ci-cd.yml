name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  security-events: write

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # CI Job - Test and Build
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Run TypeScript check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run tests (if available)
        run: npm test || echo "No tests configured"
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next
            node_modules/.prisma
          retention-days: 1

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Docker Build and Push
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate deployment summary
        run: |
          echo "### Docker Image Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "Image: ${{ env.DOCKER_IMAGE }}" >> $GITHUB_STEP_SUMMARY
          echo "SHA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # Deploy to Server
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [docker, security]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Debug - Check secrets and SSH setup
        run: |
          echo "=== Checking SERVER_HOST secret ==="
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "❌ ERROR: SERVER_HOST secret is EMPTY or NOT SET"
            echo "Please set the SERVER_HOST secret in GitHub repository settings"
          else
            echo "✅ SERVER_HOST is set (length: $(echo -n '${{ secrets.SERVER_HOST }}' | wc -c) chars)"
          fi
          
          echo ""
          echo "=== Checking SSH Agent ==="
          if [ -n "$SSH_AUTH_SOCK" ]; then
            echo "✅ SSH_AUTH_SOCK is set: $SSH_AUTH_SOCK"
            ssh-add -l || echo "No identities loaded"
          else
            echo "❌ SSH_AUTH_SOCK is not set"
          fi
          
          echo ""
          echo "=== Testing server connectivity ==="
          if [ -n "${{ secrets.SERVER_HOST }}" ]; then
            echo "Testing connection to server..."
            timeout 10 bash -c "cat < /dev/null > /dev/tcp/${{ secrets.SERVER_HOST }}/22" && echo "✅ Port 22 is open" || echo "❌ Cannot connect to port 22"
          fi

      - name: Add server to known hosts
        id: ssh-keyscan
        run: |
          mkdir -p ~/.ssh
          echo "Running ssh-keyscan for server..."
          
          # Capture both output and errors
          if ! ssh-keyscan -v ${{ secrets.SERVER_HOST }} 2>&1 | tee /tmp/keyscan_output.txt >> ~/.ssh/known_hosts; then
            echo ""
            echo "❌ ssh-keyscan failed!"
            echo ""
            echo "=== ssh-keyscan output ==="
            cat /tmp/keyscan_output.txt
            echo "=== end output ==="
            exit 1
          fi
          
          echo "✅ Server added to known hosts"

      - name: Deploy via SSH
        run: |
          # Copy docker-compose.yml only (don't copy .env files - use secrets)
          scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/projects/openclaw-mission-control/

          # Deploy via SSH with environment variables from secrets
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            cd ~/projects/openclaw-mission-control

            # Pull latest image
            docker pull ghcr.io/nhantran522000/openclaw-mission-control:latest

            # Set environment variables and restart services
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            ADMIN_API_KEY="${{ secrets.ADMIN_API_KEY }}" \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            DOCKER_IMAGE=ghcr.io/nhantran522000/openclaw-mission-control \
            docker-compose up -d --force-recreate

            # Run migrations
            docker-compose exec -T mission-control npx prisma migrate deploy

            # Health check
            sleep 10
            docker-compose ps
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 15
          curl -f https://vogalingo.win/api/health || exit 1

      - name: Generate deployment summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Environment: Production" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://vogalingo.win" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # Notify on failure
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, security, docker, deploy]
    if: failure()

    steps:
      - name: Send notification
        run: |
          echo "Pipeline failed for commit ${{ github.sha }}"
          echo "Check logs at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
